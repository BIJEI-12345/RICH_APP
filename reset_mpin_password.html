<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/jpg" href="Images/logo app 2.jpg">
    <title>RICH - Reset MPIN</title>
    <link rel="stylesheet" href="styles/reset_mpin_password.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container">
        <div class="reset-mpin-card">
            <!-- Header -->
            <div class="header">
                <div class="nav-section">
                    <button class="back-btn" onclick="goBack()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
                <div class="title-section">
                    <h1 class="page-title">Reset MPIN</h1>
                    <p class="subtitle">Enter your new 6-digit MPIN</p>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- New Password Section -->
                <div class="password-section">
                    <label class="password-label">New MPIN</label>
                    <div class="mpin-inputs">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="0">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="1">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="2">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="3">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="4">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="5">
                    </div>
                </div>

                <!-- Re-type Password Section -->
                <div class="password-section">
                    <label class="password-label">Re-type MPIN</label>
                    <div class="mpin-inputs">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="0">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="1">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="2">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="3">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="4">
                        <input type="password" class="mpin-digit-retype" maxlength="1" data-index="5">
                    </div>
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage" style="display: none;"></div>

                <!-- Submit Button -->
                <button type="button" class="submit-btn" id="submitBtn" onclick="resetMPIN()" disabled>Reset MPIN</button>
            </div>
        </div>
    </div>

    <script src="js/reset_mpin_password.js"></script>
</body>
</html>
