<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/jpg" href="Images/logo app 2.jpg">
    <title>RICH MPIN Login</title>
    <link rel="stylesheet" href="styles/mpin_login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="mpin-login-card">
            <!-- Header -->
            <div class="header">
                <div class="nav-section">
                    <button class="back-btn" onclick="goBack()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
                <div class="title-section">
                    <h1 class="page-title">Enter MPIN</h1>
                    <p class="subtitle">Enter your 6-digit MPIN to continue</p>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- User Info -->
                <div class="user-info">
                    <div class="user-email" id="userEmail"></div>
                    <p class="user-text">Enter your MPIN to access your account</p>
                </div>
                
                <!-- MPIN Input Section -->
                <div class="mpin-section">
                    <div class="mpin-inputs">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*">
                        <input type="password" class="mpin-digit" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*">
                    </div>
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage" style="display: none;"></div>

                <!-- Login Button -->
                <button type="button" class="login-btn" id="loginBtn" onclick="verifyMPIN()" disabled>Login</button>

                <!-- Forgot MPIN Link -->
                <div class="forgot-section">
                    <a href="#" class="forgot-link" onclick="forgotMPIN()">Forgot your MPIN?</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Define goBack immediately to prevent timing issues
        window.goBack = function() {
            sessionStorage.removeItem('loginEmail');
            sessionStorage.removeItem('loginMobile');
            sessionStorage.removeItem('user_email');
            sessionStorage.removeItem('user');
            // Redirect to login page (index.php)
            window.location.href = 'index.php';
        };
        
        // Force reload to bypass cache - ensures latest version is loaded
        const script = document.createElement('script');
        script.src = 'js/mpin_login.js?v=' + new Date().getTime();
        document.body.appendChild(script);
    </script>
</body>
</html>
