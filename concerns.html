<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" href="Images/logo app 2.jpg">
    <title>RICH - Feedback & Concerns</title>
    <link rel="stylesheet" href="styles/concerns.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
</head>
<body>
    <!-- Mobile Container -->
    <div class="mobile-container">
        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="header-left">
                    <div class="home-icon" onclick="goToHome()">
                        <i class="fas fa-home"></i>
                    </div>
                    <div class="logo">
                        <img src="Images/no_bg_logo.png" alt="Logo" class="logo-image">
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
        <div class="form-container">
            <div class="form-wrapper">
                <h1 class="form-title">FEEDBACK & CONCERNS</h1>

                <form class="concern-form" id="concernFormElement">
                    <div class="form-group">
                        <label>Photo (optional):</label>
                        <div class="image-preview-container" style="position: relative;">
                            <img id="cfImagePreview" class="image-preview" style="display:none" alt="Preview">
                            <button type="button" id="concernRemoveImageBtn" class="remove-image-btn" style="display:none;" onclick="removeConcernImage()" title="Remove image">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <button type="button" class="upload-btn" onclick="openConcernCamera()">Take a Photo</button>
                            <button type="button" class="upload-btn" onclick="openConcernFileUpload()">Upload Image</button>
                        </div>
                        <input type="file" id="cfImageUpload" name="cfImageUpload" accept="image/*" style="display:none" onchange="previewImage(this, 'cfImagePreview')">
                    </div>

                    <div class="form-group">
                        <label for="cfReporter">Reporter:</label>
                        <input type="text" id="cfReporter" name="cfReporter" placeholder="Auto from profile (optional)" readonly>
                    </div>

                    <div class="form-group">
                        <label for="cfContact">Contact:</label>
                        <input type="tel" id="cfContact" name="cfContact" placeholder="09XX-XXX-XXXX" maxlength="11" pattern="[0-9]*" inputmode="numeric" required>
                    </div>

                    <div class="form-group">
                        <label for="cfLocation">Sitio:</label>
                        <select id="cfLocation" name="cfLocation" required>
                            <option value="" selected>Select Sitio</option>
                            <option value="AHUNIN">AHUNIN</option>
                            <option value="BALTAZAR">BALTAZAR</option>
                            <option value="BIAK NA BATO">BIAK NA BATO</option>
                            <option value="CALLE ONSE/SAMPAGUITA">CALLE ONSE/SAMPAGUITA</option>
                            <option value="UPPER">UPPER</option>
                            <option value="COC">COC</option>
                            <option value="CRUSHER HIGHWAY">CRUSHER HIGHWAY</option>
                            <option value="INNER CRUSHER">INNER CRUSHER</option>
                            <option value="LOOBAN 1">LOOBAN 1</option>
                            <option value="LOOBAN 2">LOOBAN 2</option>
                            <option value="NABUS">NABUS</option>
                            <option value="OLD BARRIO NPC">OLD BARRIO NPC</option>
                            <option value="OLD BARRIO 2">OLD BARRIO 2</option>
                            <option value="OLD BARRIO EXT">OLD BARRIO EXT</option>
                            <option value="POBLACION">POBLACION</option>
                            <option value="KADAYUNAN">KADAYUNAN</option>
                            <option value="MANGGAHAN">MANGGAHAN</option>
                            <option value="RIVERSIDE">RIVERSIDE</option>
                            <option value="SETTLING">SETTLING</option>
                            <option value="SPAR">SPAR</option>
                            <option value="ALINSANGAN">ALINSANGAN</option>
                            <option value="RCD">RCD</option>
                            <option value="BRIA PHASE 1">BRIA PHASE 1</option>
                            <option value="BRIA PHASE 2">BRIA PHASE 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cfLandmark">Landmark:</label>
                        <input type="text" id="cfLandmark" name="cfLandmark" placeholder="Hal. Barangay Hall, Covered Court" required>
                    </div>

                    <div class="form-group">
                        <label for="cfStatement">Statement:</label>
                        <textarea id="cfStatement" name="cfStatement" rows="4" placeholder="Describe your feedback or concern" required></textarea>
                    </div>

                    <div class="submit-section">
                        <button type="submit" class="submit-btn">Submit</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Display Card -->
        <div class="report-display" id="cfReportDisplay" style="display:none">
            <div class="report-card">
                <div class="display-image" id="cfDisplayImageWrap" style="display:none">
                    <img id="cfDisplayImage" alt="Uploaded" />
                </div>

                <div class="display-row">
                    <span class="label">Reporter:</span>
                    <span class="value" id="cfDisplayReporter">-</span>
                </div>
                <div class="display-row">
                    <span class="label">Contact:</span>
                    <span class="value" id="cfDisplayContact">-</span>
                </div>
                <div class="display-row">
                    <span class="label">Date & Time:</span>
                    <span class="value" id="cfDisplayDateTime">-</span>
                </div>
                <div class="display-row">
                    <span class="label">Sitio:</span>
                    <span class="value" id="cfDisplayLocation">-</span>
                </div>
                <div class="display-row">
                    <span class="label">Landmark:</span>
                    <span class="value" id="cfDisplayLandmark">-</span>
                </div>
                <div class="display-column">
                    <span class="label">Statement:</span>
                    <div class="statement" id="cfDisplayStatement">-</div>
                </div>

                <div class="report-actions">
                    <button type="button" class="btn-secondary" onclick="cfSubmitAnother()">Submit Another</button>
                    <button type="button" class="btn-primary" onclick="goToHome()">Go to Home</button>
                </div>
            </div>
        </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/concerns.js?v=20260417210000"></script>
</body>
</html>
