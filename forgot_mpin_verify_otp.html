<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/jpg" href="Images/logo app 2.jpg">
    <title>RICH - Verify OTP</title>
    <link rel="stylesheet" href="styles/forgot_mpin_verify_otp.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="verify-otp-card">
            <!-- Header -->
            <div class="header">
                <div class="nav-section">
                    <button class="back-btn" onclick="goBack()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
                <div class="title-section">
                    <h1 class="page-title">Verify OTP</h1>
                    <p class="subtitle">Enter the 6-digit code sent to your email</p>
                </div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Email Display -->
                <div class="email-info">
                    <p class="email-text">Code sent to <span id="emailDisplay" class="email-address"></span></p>
                </div>

                <!-- OTP Input Section -->
                <div class="otp-section">
                    <div class="otp-inputs">
                        <input type="text" class="otp-digit" maxlength="1" data-index="0" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                        <input type="text" class="otp-digit" maxlength="1" data-index="1" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                        <input type="text" class="otp-digit" maxlength="1" data-index="2" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                        <input type="text" class="otp-digit" maxlength="1" data-index="3" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                        <input type="text" class="otp-digit" maxlength="1" data-index="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                        <input type="text" class="otp-digit" maxlength="1" data-index="5" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
                    </div>
                </div>

                <!-- Resend Section -->
                <div class="resend-section" id="resendSection">
                    <p class="resend-timer">Resend code in <span id="countdown">1:00</span></p>
                </div>

                <!-- Error Message -->
                <div class="error-message" id="errorMessage" style="display: none;"></div>

                <!-- Verify Button -->
                <button type="button" class="verify-btn" id="verifyBtn" onclick="verifyOTP()" disabled>Verify</button>
            </div>
        </div>
    </div>

    <script src="js/forgot_mpin_verify_otp.js"></script>
</body>
</html>
